name: Go Tests

on:
  pull_request:
    branches: [ main, feat/** ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -v ./...

      - name: Unit Tests
        run: go test -v -count=1 -short ./...

      - name: Integration Tests
        run: go test -v -count=1 -run Integration ./...